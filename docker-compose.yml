version: '3.8'

services:
  backend:
    build:
      context: ./excel-processor
      dockerfile: Dockerfile
    container_name: kyntus_backend
    restart: unless-stopped
    ports:
      # Optionnel: y9der Omar yt-testi API nichan f 8085 ila bgha
      - "8085:8081" 
    deploy:
      resources:
        limits:
          memory: 1G 

  frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
    container_name: kyntus_frontend
    ports:
      # L'Host ghadi ychouf 3005 (Kima mtaf9in f Tsawer)
      - "3005:3000"
    environment:
      # DNS dyal Docker kay-traduj 'backend' l'IP interne dyal Spring Boot!
      - BACKEND_URL=http://backend:8081
    depends_on:
      - backend
    restart: unless-stopped