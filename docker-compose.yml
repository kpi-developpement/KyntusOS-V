version: '3.8'

services:
  backend:
    build:
      context: ./excel-processor
      dockerfile: Dockerfile
    container_name: kyntus_backend_v3_omega
    restart: unless-stopped
    ports:
      # L'Backend f l'port 8779
      - "8779:8081" 
    deploy:
      resources:
        limits:
          memory: 1G 
    networks:
      - kyntus-v3-network

  frontend:
    build:
      context: ./app-frontend
      dockerfile: Dockerfile
      args:
        # 🔥 THE LINK: Hna l'navigateur dyal l'utilisateur ghadi y-3ref fin mkhbe3 l'Backend
        - NEXT_PUBLIC_API_URL=http://10.10.10.50:8779
    container_name: kyntus_frontend_v3_omega
    restart: unless-stopped
    ports:
      # L'Frontend f l'port 3779
      - "3779:3000"
    networks:
      - kyntus-v3-network

# Déclaration dyal l'Réseau interne
networks:
  kyntus-v3-network:
    driver: bridge