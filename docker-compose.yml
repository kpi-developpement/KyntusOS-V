# 🔥 KYNTUS OS RECORD - PROD CONFIGURATION (FORCE UPDATE TRIGGER)
version: '3.8'

services:
  # 1. Le Backend (Spring Boot) - MODE PRODUCTION
  backend:
    build:
      context: ./operatingsystem
      dockerfile: Dockerfile
    container_name: kyntus_record_backend
    restart: always
    ports:
      - "8083:8083"
    environment:
      # 🔥 CONNECTION NISHAN L'SERVEUR PROD (10.10.10.50)
      - SPRING_DATASOURCE_URL=jdbc:postgresql://10.10.10.50:5432/kyntus_db?reWriteBatchedInserts=true
      - SPRING_DATASOURCE_USERNAME=kyntus_user
      - SPRING_DATASOURCE_PASSWORD=kyntus_password
      # ⚠️ CRITIQUE: 'none' bach may-msse7ch/may-9issch les tables dyal App 1 f Prod!
      - SPRING_JPA_HIBERNATE_DDL_AUTO=none
    networks:
      - kyntus-record-network

  # 2. Le Frontend (Next.js) - MODE PRODUCTION
  frontend:
    build:
      context: ./kyntus-os-frontend
      dockerfile: Dockerfile
      args:
        # 🔥 Injection dyal l'IP d'l'VPS bach Next.js y-tbuilda 3lih
        - NEXT_PUBLIC_API_URL=http://10.10.10.50:8083
    container_name: kyntus_record_frontend
    restart: always
    ports:
      - "3030:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://10.10.10.50:8083
    depends_on:
      - backend
    networks:
      - kyntus-record-network

networks:
  kyntus-record-network:
    driver: bridge